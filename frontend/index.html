<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Welcome Screen -->
<div id="welcome-screen">
    <h1>Welcome to your bot, Maalik! ❤️</h1>
</div>

<!-- Floating Hearts -->
<div class="hearts"></div>

<!-- Main Container -->
<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Role</h3>
        <button onclick="setRole('general')">General</button>
        <button onclick="setRole('medical')">Medical</button>
        <button onclick="setRole('student')">Student</button>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">
        <div id="chatbox"></div>

        <div class="input-area">
            <input type="text" id="message" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
